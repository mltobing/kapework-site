# ─────────────────────────────────────────────────────────────────────────────
# netlify.toml — Kapework
# ─────────────────────────────────────────────────────────────────────────────
#
# Subdomain routing strategy
# ──────────────────────────
# Netlify does NOT support extracting a :placeholder from the host and reusing
# it in the destination path.  The dynamic ":app" host-placeholder was silently
# ignored, so every subdomain fell through to the root.
#
# Fix: explicit per-subdomain rewrite rules.
# Each subdomain gets two rules:
#   a) /shared/*  → /shared/:splat   (shared assets: fonts, scripts, icons)
#   b) /*         → /apps/<name>/:splat  (the app itself)
#
# To add a new subdomain in future:
#   1. Create /apps/<name>/index.html
#   2. Add <name>.kapework.com as a domain alias in the Netlify UI
#   3. Add two rules below following the same pattern
#   4. Commit + push
#
# Rule order: Netlify evaluates top-to-bottom and stops on the first match.
# ─────────────────────────────────────────────────────────────────────────────

# ── www guard ────────────────────────────────────────────────────────────────
# www is a plain alias for the root site — serve it normally.
[[redirects]]
  from   = "https://www.kapework.com/*"
  to     = "/:splat"
  status = 200

# ── readysetread.kapework.com ─────────────────────────────────────────────────
[[redirects]]
  from   = "https://readysetread.kapework.com/shared/*"
  to     = "/shared/:splat"
  status = 200

[[redirects]]
  from   = "https://readysetread.kapework.com/*"
  to     = "/apps/readysetread/:splat"
  status = 200

# ── create.kapework.com ───────────────────────────────────────────────────────
[[redirects]]
  from   = "https://create.kapework.com/shared/*"
  to     = "/shared/:splat"
  status = 200

[[redirects]]
  from   = "https://create.kapework.com/*"
  to     = "/apps/create/:splat"
  status = 200

# ── braingym.kapework.com ─────────────────────────────────────────────────────
[[redirects]]
  from   = "https://braingym.kapework.com/shared/*"
  to     = "/shared/:splat"
  status = 200

[[redirects]]
  from   = "https://braingym.kapework.com/*"
  to     = "/apps/braingym/:splat"
  status = 200

# ── numbercrunch.kapework.com ─────────────────────────────────────────────────
[[redirects]]
  from   = "https://numbercrunch.kapework.com/shared/*"
  to     = "/shared/:splat"
  status = 200

[[redirects]]
  from   = "https://numbercrunch.kapework.com/*"
  to     = "/apps/numbercrunch/:splat"
  status = 200
