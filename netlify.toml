# ─────────────────────────────────────────────────────────────────────────────
# netlify.toml — Kapework
# ─────────────────────────────────────────────────────────────────────────────
#
# Subdomain routing
# ─────────────────
# All subdomain → /apps/* routing is handled by the edge function at
# netlify/edge-functions/subdomain-router.ts.
#
# The edge function rewrites <slug>.kapework.com requests transparently
# (the subdomain stays in the address bar) to /apps/<slug>/... or
# /apps/<slug>.html depending on app type.
#
# Folder apps work automatically — no changes to this file needed when
# adding a new folder-based app.  Single-file apps require one line added
# to the SINGLE_FILE map in the edge function.
# ─────────────────────────────────────────────────────────────────────────────

# ── Build ─────────────────────────────────────────────────────────────────────
# Generates shared/config.js with GA_MEASUREMENT_ID baked in from the
# Netlify build environment. The committed shared/config.js is a placeholder
# (empty ID) that is overwritten at deploy time.
[build]
  command = "node scripts/generate-config.js"

# ── Secrets scanning ──────────────────────────────────────────────────────────
# generate-config.js intentionally writes the *public* Supabase values
# (SUPABASE_URL and the browser-safe SUPABASE_ANON_KEY) into shared/config.js —
# that is how the client reads them. Exempt only those two public keys from
# Netlify's secrets scanning so a by-design public value doesn't fail the deploy.
# The real server-only secrets (SUPABASE_SERVICE_ROLE_KEY, MA_DEVICE_TOKEN_PEPPER)
# are deliberately NOT exempted — they must never appear in build output.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY"

# ── Netlify Functions ─────────────────────────────────────────────────────────
[functions]
  directory = "netlify/functions"

# ── Edge function: subdomain router ──────────────────────────────────────────
# Catches every request so the router can inspect the hostname.
[[edge_functions]]
  function = "subdomain-router"
  path     = "/*"

# ── www guard ─────────────────────────────────────────────────────────────────
# Belt-and-suspenders: edge function already passes www through unchanged,
# but keeping this redirect ensures www always resolves to the root site
# even if the edge function is bypassed or temporarily disabled.
[[redirects]]
  from   = "https://www.kapework.com/*"
  to     = "/:splat"
  status = 200

# ── Cache control: Ma's app shell and ES modules ──────────────────────────────
# These paths are served at stable, unhashed filenames (no content-hash in
# the URL, unlike a bundled build), so there is nothing to bust a stale cache
# on deploy — a browser (or an installed PWA, which can cache far more
# aggressively) can otherwise keep serving an old copy of api.js/index.html
# indefinitely after a fix has shipped. `no-cache` still lets the browser
# cache the response; it just forces a conditional revalidation (an
# If-None-Match round-trip, normally answered 304) on every load, so a fixed
# bug can never sit in a stale cache. Paths are matched post-rewrite — see
# netlify/edge-functions/subdomain-router.ts, which rewrites
# ma.kapework.com/* to /apps/ma/* before this applies. Private API responses
# (Supabase, Netlify Functions) are unaffected — they're already no-store at
# that layer, not cached static files.
[[headers]]
  for = "/apps/ma/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/apps/ma/src/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/apps/ma/styles.css"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/apps/ma/vandaag/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/shared/config.js"
  [headers.values]
    Cache-Control = "no-cache"
