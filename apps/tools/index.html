<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0a1628">
  <title>Tools · Kapework</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/kapework-shell.css">
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:        #0a1628;
  --surface:   #121e33;
  --cyan:      #00e5cc;
  --cyan-dim:  rgba(0,229,204,0.15);
  --text:      #e8edf5;
  --muted:     rgba(232,237,245,0.5);
  --muted-dim: rgba(232,237,245,0.3);
  --border:    rgba(232,237,245,0.08);
}

html, body { height: 100%; background: var(--bg); overscroll-behavior: none; }

body {
  font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100dvh;
  -webkit-user-select: none;
  user-select: none;
}

a { color: inherit; text-decoration: none; }

.page {
  width: 100%;
  max-width: 480px;
  padding: 12px 16px env(safe-area-inset-bottom, 16px);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  flex: 1;
}

.top-bar {
  width: 100%;
  display: flex;
  justify-content: flex-end;
  align-items: center;
}

/* ─── Header ── */
.hub-header { text-align: center; }
.hub-logo   { font-size: 2.25rem; line-height: 1; }
.hub-title  { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; margin-top: 6px; }
.hub-sub    { font-size: 0.85rem; color: var(--muted); margin-top: 3px; }

/* ─── Shelf list ── */
.shelf-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
}

a.shelf-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 13px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
a.shelf-card:hover { border-color: var(--cyan); box-shadow: 0 0 16px var(--cyan-dim); }
a.shelf-card:active { opacity: 0.8; }

.shelf-icon { font-size: 1.75rem; flex-shrink: 0; width: 2.25rem; text-align: center; }
.shelf-info { flex: 1; min-width: 0; }
.shelf-name { font-size: 1rem; font-weight: 800; line-height: 1.2; }
.shelf-desc { font-size: 0.8rem; color: var(--muted); margin-top: 1px; }

/* ─── Coming soon line ── */
.coming-soon {
  font-size: 0.78rem;
  color: var(--muted-dim);
  text-align: center;
  padding: 4px 0 0;
}

/* ─── Footer ── */
.hub-footer {
  margin-top: auto;
  color: var(--muted-dim);
  font-size: 0.75rem;
  text-align: center;
  padding-bottom: 8px;
}
  </style>
</head>
<body>

<div class="page">

  <div class="top-bar">
    <div id="kw-shell-mount"></div>
  </div>

  <div class="hub-header">
    <div class="hub-logo">🛠️</div>
    <h1 class="hub-title">Tools</h1>
    <p class="hub-sub">Utilities for builders</p>
  </div>

  <div class="shelf-list">

    <a class="shelf-card" href="https://clipdigest.kapework.com/">
      <div class="shelf-icon">🎞️</div>
      <div class="shelf-info">
        <div class="shelf-name">ClipDigest</div>
        <div class="shelf-desc">Turn a short recording into a timestamped visual digest</div>
      </div>
    </a>

    <a class="shelf-card" href="https://nameforge.kapework.com/">
      <div class="shelf-icon">⚒️</div>
      <div class="shelf-info">
        <div class="shelf-name">NameForge</div>
        <div class="shelf-desc">Names and taglines for apps, games, and tools</div>
      </div>
    </a>

  </div>

  <div class="hub-footer">Kapework · Tools</div>

</div>

<script src="/shared/config.js"></script>
<script src="/shared/analytics.js"></script>
<script src="/shared/subdomain-nav.js"></script>
<script src="/shared/kapework-shell.js"></script>
<script>
  KapeworkAnalytics.init('tools');
  KapeworkShell.init({ appSlug: 'tools', mountId: 'kw-shell-mount' });
</script>
</body>
</html>
