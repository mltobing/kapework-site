<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- Private, read-only device page — never indexed -->
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">

  <!-- Installable "Vandaag" display -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Vandaag">
  <meta name="theme-color" content="#FAF7F4">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon.svg">

  <title>Vandaag</title>
  <link rel="stylesheet" href="./vandaag.css">
</head>
<body>
  <div id="vandaag">
    <div class="vandaag-loading">Een ogenblik…</div>
  </div>

  <noscript>
    <div class="vandaag-loading">Vandaag heeft JavaScript nodig. Zet dit aan in de browserinstellingen.</div>
  </noscript>

  <script type="module" src="./src/trusted.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => { /* SW optional */ });
      });
    }
  </script>
</body>
</html>
