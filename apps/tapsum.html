<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>TapSum — Number Crunch</title>
<link rel="stylesheet" href="/shared/kapework-shell.css">
<link rel="stylesheet" href="/apps/tapsum.css">
</head>
<body>
<div class="wrap">
  <a class="back-btn" href="https://numbercrunch.kapework.com/" aria-label="Back to Number Crunch">← Number Crunch</a>

  <header>
    <h1>TapSum</h1>
    <button id="ambience" class="btn" title="Ambient sound">🎧</button>
    <div id="kw-shell-mount"></div>
  </header>

  <!-- ── Idle / start screen ─────────────────────────────────────────── -->
  <div id="idle-panel" class="panel idle-panel">
    <h2>10 boards.<br>3 lives.<br>Go fast.</h2>
    <p class="idle-rules">
      Tap numbers that sum exactly to the target.<br>
      Speed earns bonus points. Chain clears for a multiplier.
    </p>
    <p class="idle-best">Best: <strong id="idle-best">0</strong> pts</p>
    <button id="start" class="primary-btn">Start Run</button>
  </div>

  <!-- ── Game panel ──────────────────────────────────────────────────── -->
  <div id="game-panel" class="panel hidden">

    <div class="hud">
      <span id="lives" class="lives" aria-label="Lives remaining"></span>
      <div class="hud-right">
        <span class="pill">Board <strong id="progress">1/10</strong></span>
        <span class="pill">Score <strong id="score">0</strong></span>
      </div>
    </div>

    <div class="chain-row">
      Chain <strong id="chain">0</strong><em id="mult" class="mult"></em>
    </div>

    <div class="timer-track" id="timer-track">
      <div class="timer-bar" id="timer-bar"></div>
    </div>

    <div class="target">
      <div class="label">Target</div>
      <div id="target" class="num">—</div>
      <div class="live">
        <div id="expr" class="expr"></div>
        <div id="sumline" class="total">Total 0</div>
        <div id="delta" class="delta"></div>
      </div>
    </div>

    <div id="grid" class="grid" role="group" aria-label="Number grid"></div>

    <div class="actions">
      <button id="clear">Clear</button>
      <button id="skip" class="skip-btn">Skip −❤️</button>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>
  </div>

  <!-- ── Result panel ────────────────────────────────────────────────── -->
  <div id="result-panel" class="panel result-panel hidden">
    <div id="result-header" class="result-header">Run Complete</div>
    <div id="result-score" class="result-score">0</div>
    <div id="result-boards"     class="result-stat"></div>
    <div id="result-chain-stat" class="result-stat"></div>
    <div id="result-best"       class="result-best"></div>
    <div class="result-actions">
      <button id="replay" class="primary-btn">Play Again</button>
      <button id="share-btn" class="btn">Share</button>
    </div>
    <a class="back-link" href="https://numbercrunch.kapework.com/">← Number Crunch</a>
  </div>

  <p class="kbd-hint">1–9 select &middot; Backspace undo &middot; Esc clear</p>
</div>

<!-- Supabase (for cloud best-score storage) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Shared Kapework utilities (sets window.KapeworkConfig) -->
<script src="/shared/config.js"></script>
<script src="/shared/analytics.js"></script>
<script src="/shared/kapework-shell.js"></script>
<script>
  KapeworkAnalytics.init('tapsum');
  KapeworkShell.init({ appSlug: 'tapsum', mountId: 'kw-shell-mount' });
</script>
<!-- Game module — deferred by spec, runs after all scripts above -->
<script type="module" src="/apps/tapsum/game.js"></script>
</body>
</html>
