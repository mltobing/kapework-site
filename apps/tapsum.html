<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>TapSum</title>
<link rel="stylesheet" href="/shared/kapework-shell.css">
<style>
  :root {
    --bg:#0b1220; --panel:#121a2c; --ink:#e8eefc; --muted:#93a3c9; --bd:rgba(255,255,255,.08);
    --accent:#7dd3fc; --ok:#34d399; --err:#fb7185;
  }
  *{box-sizing:border-box} html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto}
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 24px}
  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  h1{margin:0;font-size:20px}
  .stats{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border:1px solid var(--bd);border-radius:999px;background:#0e1729}
  .pill strong{font-weight:800}
  .btn{padding:6px 10px;border-radius:10px;border:1px solid var(--bd);background:#0e1729;color:var(--ink);cursor:pointer}
  .panel{background:var(--panel);border:1px solid var(--bd);border-radius:16px;padding:12px}
  .helper{margin:2px 2px 8px;color:var(--muted);font-size:14px}
  .target{display:flex;flex-direction:column;align-items:center;gap:6px;margin:4px 0 6px;padding:10px;border-radius:14px;background:rgba(125,211,252,.05);border:1px solid rgba(125,211,252,.15)}
  .label{font-size:12px;color:var(--muted)}
  .target .num{font-size:48px;font-weight:800;letter-spacing:.5px}
  .live{display:flex;flex-direction:column;gap:4px;align-items:center;padding:6px 0 2px}
  .expr{min-height:20px;font-size:14px;color:var(--muted)}
  .total{font-size:20px;font-weight:700}
  .delta{font-size:14px;color:var(--muted);transition:color .12s ease, transform .12s ease}
  .delta.exact{color:var(--ok);transform:scale(1.03)}
  .delta.over{color:var(--err)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0 8px}
  .cell{height:100px;border-radius:16px;border:1px solid var(--bd);background:rgba(255,255,255,.02);
        display:flex;align-items:center;justify-content:center;font-weight:700;font-size:28px;cursor:pointer;user-select:none;transition:transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease}
  .cell:active{transform:scale(.98)}
  .cell.sel{border-color:rgba(125,211,252,.75);background:rgba(125,211,252,.16);box-shadow:0 0 0 2px rgba(125,211,252,.18),0 8px 20px rgba(0,0,0,.3);transform:translateY(-1px)}
  .cell.hit{animation:hitPulse .14s ease}
  .cell.over{animation:overPulse .14s ease}
  @keyframes hitPulse { 0%{transform:scale(1)} 50%{transform:scale(1.07)} 100%{transform:scale(1)} }
  @keyframes overPulse { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
  .sumrow{display:flex;justify-content:center;gap:10px;margin:6px 0 2px;color:var(--muted)}
  .sumrow .v{min-width:2ch;text-align:right;color:var(--ink)}
  .actions{display:flex;gap:10px;justify-content:center;margin-top:14px}
  button{padding:10px 14px;border-radius:12px;border:1px solid var(--bd);background:#0e1729;color:var(--ink);cursor:pointer;font:inherit}
  button:hover{background:#0f1a2f}
  .toast{height:22px;text-align:center;font-size:14px;color:var(--muted);margin-top:8px}
  .toast.ok{color:var(--ok)} .toast.err{color:var(--err)}
  .share{display:none;justify-content:center;gap:8px;align-items:center;margin-top:8px}
  .share.show{display:flex}
  .share .mini{font-size:12px;color:var(--muted)}
  .kbd-hint{margin:10px 4px 0;color:var(--muted);font-size:12px;opacity:.7}
  .summary{margin-top:8px;text-align:center;font-size:12px;color:var(--muted);min-height:18px}
  @media (max-width:559px){ .kbd-hint{display:none} }
  @media (min-width:560px){ .cell{height:120px} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>TapSum</h1>
    <div class="stats">
      <span class="pill">Today <strong id="today">0</strong></span>
      <span class="pill">Chain <strong id="streak">0</strong></span>
      <span class="pill">Best Chain <strong id="best">0</strong></span>
      <button id="ambience" class="btn" title="Ambient sound (calming pad)">🎧</button>
    </div>
    <div id="kw-shell-mount"></div>
  </header>

  <div class="panel">
    <p class="helper">Tap numbers that add exactly to the target.</p>
    <div class="target">
      <div class="label">Target</div>
      <div id="target" class="num">12</div>
      <div class="live">
        <div id="expr" class="expr"></div>
        <div id="sumline" class="total">Total 0</div>
        <div id="delta" class="delta">Need 12</div>
      </div>
    </div>

    <div id="grid" class="grid" role="group" aria-label="number grid"></div>

    <div class="actions">
      <button id="restart" title="Clear picks (Esc / Enter)">Clear</button>
      <button id="new" title="New board (Enter after win)">New Board</button>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>
    <div id="shareRow" class="share">
      <span class="mini" id="shareText">Share your run</span>
      <button id="shareBtn" class="btn" type="button">Share</button>
    </div>
    <div id="summary" class="summary"></div>
  </div>

  <p class="kbd-hint">
    Keyboard: <strong>1–9</strong> select, <strong>Backspace</strong> undo, <strong>Esc</strong> clear, <strong>Enter</strong> new.
  </p>
</div>

<!-- Supabase (for global best storage) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  const SUPABASE_URL  = "https://fimsbfcvavpehryvvcho.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpbXNiZmN2YXZwZWhyeXZ2Y2hvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTUzOTEwMDMsImV4cCI6MjA3MDk2NzAwM30.6uAm_bDPN9aetYaKWA7zCvS8XDEVhmKKxA7RA7YK4JQ";
  const SLUG = "tapsum";
  let sb = null;

  // --- DOM
  const gridEl = document.getElementById('grid');
  const targetEl = document.getElementById('target');
  const sumLineEl = document.getElementById('sumline');
  const exprEl = document.getElementById('expr');
  const deltaEl = document.getElementById('delta');
  const restartBtn = document.getElementById('restart');
  const newBtn = document.getElementById('new');
  const toast = document.getElementById('toast');
  const streakEl = document.getElementById('streak');
  const bestEl = document.getElementById('best');
  const todayEl = document.getElementById('today');
  const ambienceBtn = document.getElementById('ambience');
  const shareRow = document.getElementById('shareRow');
  const shareBtn = document.getElementById('shareBtn');
  const shareText = document.getElementById('shareText');
  const summaryEl = document.getElementById('summary');

  // --- Device/local state
  const DID_KEY = "kapework_did_v1";
  const BEST_KEY = "tapsum_best_streak_v1";
  const TODAY_KEY = "tapsum_solved_today_v1";
  let deviceId = localStorage.getItem(DID_KEY);
  if (!deviceId) { deviceId = (crypto?.randomUUID?.() || String(Math.random()).slice(2)); localStorage.setItem(DID_KEY, deviceId); }
  let bestLocal = parseInt(localStorage.getItem(BEST_KEY)||"0",10);
  function todayStr(){ return new Date().toISOString().slice(0,10); }
  function readTodaySolved(){
    const data = JSON.parse(localStorage.getItem(TODAY_KEY) || '{}');
    if (data.date !== todayStr()) return 0;
    return Number(data.count || 0);
  }
  function bumpTodaySolved(){
    const next = readTodaySolved() + 1;
    localStorage.setItem(TODAY_KEY, JSON.stringify({ date: todayStr(), count: next }));
    todayEl.textContent = String(next);
  }
  bestEl.textContent = bestLocal;
  todayEl.textContent = String(readTodaySolved());

  // --- Game state
  let cells = [];          // [{el,val,selected}]
  let picks = [];          // indices of selected cells
  let target = 0;
  let won = false;
  let streak = 0;
  let runSolved = 0;
  let runStartAt = Date.now();
  let interacted = false;  // to decide if Restart/New should reset streak

  // --- Ambient sound (very soft pad; requires user tap)
  let ctx = null, gain=null, o1=null, o2=null, lfo=null;
  function toggleAmbience(){
    if (!ctx){
      ctx = new (window.AudioContext||window.webkitAudioContext)();
      gain = ctx.createGain(); gain.gain.value = 0.03; gain.connect(ctx.destination);
      o1 = ctx.createOscillator(); o1.type="sine"; o1.frequency.value=220; o1.detune.value=-6; o1.connect(gain); o1.start();
      o2 = ctx.createOscillator(); o2.type="sine"; o2.frequency.value=220; o2.detune.value=+6; o2.connect(gain); o2.start();
      lfo = ctx.createOscillator(); lfo.type="sine"; lfo.frequency.value=0.08;
      const lfoGain = ctx.createGain(); lfoGain.gain.value = 12; // gentle pitch drift
      lfo.connect(lfoGain); lfoGain.connect(o1.detune); lfoGain.connect(o2.detune); lfo.start();
      ambienceBtn.textContent = "🎧 On";
    } else if (ctx.state === "running") {
      ctx.suspend(); ambienceBtn.textContent = "🎧";
    } else {
      ctx.resume(); ambienceBtn.textContent = "🎧 On";
    }
  }
  ambienceBtn.addEventListener('click', toggleAmbience);

  // --- Helpers
  const rand = (a,b)=>Math.floor(Math.random()*(b-a+1))+a;
  function updateStreak(v){ streak = v; streakEl.textContent = v; }
  function shortVibrate(ms){ if (navigator.vibrate) navigator.vibrate(ms); }
  function fmtSecs(ms){ return Math.max(1, Math.round(ms / 1000)); }
  function hideShare(){ shareRow.classList.remove('show'); }

  async function shareRun(){
    const text = `TapSum\n✅ ${runSolved} targets\n⚡ ${fmtSecs(Date.now()-runStartAt)}s\n🔥 Streak ${streak}\n${location.origin + location.pathname}`;
    try{
      if (navigator.share){ await navigator.share({ title:'TapSum', text }); return true; }
      if (navigator.clipboard?.writeText){ await navigator.clipboard.writeText(text); toast.textContent = 'Copied run summary.'; toast.className='toast ok'; return true; }
    }catch(e){ /* noop */ }
    toast.textContent = 'Share unavailable on this device.'; toast.className='toast err';
    return false;
  }

  function showSummary(prefix='Run'){
    const elapsed = fmtSecs(Date.now()-runStartAt);
    summaryEl.textContent = `${prefix}: ${runSolved} solved • ${elapsed}s • best chain ${bestLocal}`;
  }

  function genRound(){
    won = false; interacted = false;
    toast.textContent = "";
    picks = [];
    hideShare();

    // Build guaranteed-solvable target: pick 2-4 base numbers
    const must = Array.from({length:rand(2,4)}, ()=>rand(1,9));
    target = must.reduce((a,b)=>a+b,0);
    targetEl.textContent = String(target);

    // Fill grid, inject must
    const vals = Array.from({length:9}, ()=>rand(1,9));
    const slots = [...Array(9).keys()].sort(()=>Math.random()-0.5).slice(0,must.length);
    slots.forEach((pos,i)=>{ vals[pos]=must[i]; });

    // DOM rebuild
    gridEl.innerHTML = "";
    cells = vals.map((v,idx)=>{
      const el = document.createElement('div');
      el.className = 'cell'; el.textContent = v;
      el.setAttribute('role','button'); el.setAttribute('tabindex','0');
      el.addEventListener('click', ()=>{ interacted=true; toggle(idx); });
      el.addEventListener('keydown', e=>{
        if (e.key==='Enter' || e.key===' ') { e.preventDefault(); interacted=true; toggle(idx); }
      });
      gridEl.appendChild(el);
      return { el, val:v, selected:false };
    });
  }

  function updateSum(){
    const s = picks.reduce((a,i)=>a+cells[i].val,0);
    const expr = picks.map(i=>cells[i].val).join(' + ');
    exprEl.textContent = expr;
    sumLineEl.textContent = `Total ${s}`;
    const delta = target - s;
    deltaEl.classList.remove('exact','over');
    if (s === 0){ deltaEl.textContent = `Need ${target}`; }
    else if (delta > 0){ deltaEl.textContent = `Need ${delta}`; }
    else if (delta < 0){ deltaEl.textContent = `Over by ${Math.abs(delta)}`; deltaEl.classList.add('over'); }
    else { deltaEl.textContent = 'Exact'; deltaEl.classList.add('exact'); }
    return s;
  }

  async function onWin(){
    won = true;
    shortVibrate([18,30,18]);
    cells.forEach(c=>c.el.classList.add('hit'));
    setTimeout(()=>cells.forEach(c=>c.el.classList.remove('hit')), 150);

    updateStreak(streak+1);
    runSolved += 1;
    bumpTodaySolved();
    toast.textContent = "Exact! Nice hit.";
    toast.className = "toast ok";

    // Personal best (local + cloud)
    if (streak > bestLocal){
      bestLocal = streak;
      localStorage.setItem(BEST_KEY, String(bestLocal));
      bestEl.textContent = bestLocal;
      // Upsert to Supabase
      try{
        if (!sb) sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
        await sb.from("scores").upsert(
          { slug: SLUG, device_id: deviceId, best_streak: bestLocal },
          { onConflict: "slug,device_id" }
        );
      }catch(e){ /* ignore */ }
    }

    showSummary('Current run');
    shareText.textContent = `✅ ${runSolved} targets • ${fmtSecs(Date.now()-runStartAt)}s`;
    shareRow.classList.add('show');
    setTimeout(genRound, 900);
  }

  function toggle(i){
    if (won) return;
    const c = cells[i];
    c.selected = !c.selected;
    if (c.selected){ picks.push(i); c.el.classList.add('sel'); }
    else { picks = picks.filter(x=>x!==i); c.el.classList.remove('sel'); }
    const s = updateSum();
    if (s === target){ onWin(); }
    else if (s > target){
      shortVibrate(14);
      c.el.classList.add('over');
      setTimeout(()=>c.el.classList.remove('over'), 150);
      toast.textContent = "Over target — undo or clear.";
      toast.className = "toast err";
    }
    else { toast.textContent = ""; toast.className = "toast"; }
  }

  // Digit selection with cycling
  const lastHitByVal = {};
  function pickByDigit(d){
    interacted = true;
    const val = d;
    const start = (lastHitByVal[val] ?? -1) + 1;
    const order = [...Array(9).keys()];
    const perm = order.slice(start).concat(order.slice(0,start));
    for (const i of perm){ if (cells[i].val === val){ lastHitByVal[val]=i; toggle(i); return; } }
    toast.textContent = `No ${val} available.`; toast.className = "toast err";
    setTimeout(()=>{ toast.textContent=""; toast.className="toast"; }, 400);
  }

  restartBtn.addEventListener('click', ()=>{
    if (!won && interacted){
      showSummary('Run ended');
      updateStreak(0); // break streak if you give up mid-round
      runSolved = 0;
      runStartAt = Date.now();
    }
    picks.forEach(i=>cells[i].el.classList.remove('sel'));
    cells.forEach(c=>c.selected=false); picks=[]; toast.textContent=""; toast.className="toast"; updateSum(); hideShare();
  });
  newBtn.addEventListener('click', ()=>{
    if (!won && interacted){
      showSummary('Run ended');
      updateStreak(0); // starting fresh mid-round breaks streak
      runSolved = 0;
      runStartAt = Date.now();
    }
    genRound();
  });

  window.addEventListener('keydown', (e)=>{
    if (e.target && ['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
    if (e.key>='1' && e.key<='9'){ pickByDigit(parseInt(e.key,10)); return; }
    if (e.key==='Backspace' || e.key==='Delete'){
      interacted = true;
      const i = picks.pop();
      if (i!=null){ cells[i].selected=false; cells[i].el.classList.remove('sel'); updateSum(); }
      e.preventDefault(); return;
    }
    if (e.key==='Escape'){ restartBtn.click(); }
    if (e.key==='Enter'){ if (won) newBtn.click(); else restartBtn.click(); }
  });

  shareBtn.addEventListener('click', shareRun);

  // init
  updateStreak(0);
  showSummary('Current run');
  genRound();
})();
</script>
<script src="/shared/config.js"></script>
<script src="/shared/analytics.js"></script>
<script src="/shared/kapework-shell.js"></script>
<script>
  KapeworkAnalytics.init('tapsum');
  KapeworkShell.init({ appSlug: 'tapsum', mountId: 'kw-shell-mount' });
</script>
</body>
</html>
