<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0a1628">
  <title>Tap Piano · Kapework</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/kapework-shell.css">
  <style>
/* ── Reset & tokens ─────────────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
:root {
  --bg:       #0a1628;
  --surface:  #121e33;
  --surface2: #1a2a44;
  --cyan:     #00e5cc;
  --cyan-dim: rgba(0,229,204,0.15);
  --text:     #e8edf5;
  --muted:    rgba(232,237,245,0.5);
  --border:   rgba(232,237,245,0.08);
}
html, body {
  height: 100%;
  background: var(--bg);
  overscroll-behavior: none;
}
body {
  font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
  color: var(--text);
  -webkit-user-select: none;
  user-select: none;
}

/* ── Screens ────────────────────────────────────────────── */
.screen        { display: none; }
.screen.active { display: flex; flex-direction: column; align-items: center; min-height: 100dvh; }

/* ── Page wrapper ───────────────────────────────────────── */
.page {
  width: 100%;
  max-width: 680px;
  padding: 12px 10px env(safe-area-inset-bottom, 16px);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  flex: 1;
}

/* ── Top bar ────────────────────────────────────────────── */
.top-bar {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.back-btn {
  background: none; border: none;
  color: var(--muted); font-size: 0.9rem; font-weight: 700;
  font-family: inherit; cursor: pointer;
  padding: 6px 10px; border-radius: 8px;
  transition: color 0.15s; text-decoration: none;
}
.back-btn:hover, .back-btn:active { color: var(--text); }
.tunes-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--muted); font-family: inherit;
  font-size: 0.85rem; font-weight: 700;
  padding: 7px 14px; cursor: pointer;
  transition: all 0.15s;
}
.tunes-btn:hover { border-color: var(--cyan); color: var(--cyan); }

/* ── Header ─────────────────────────────────────────────── */
.app-header { text-align: center; }
.app-title  { font-size: 1.75rem; font-weight: 900; letter-spacing: -0.5px; }
.app-sub    { font-size: 0.85rem; color: var(--muted); margin-top: 3px; }

/* ── Piano area ─────────────────────────────────────────── */
.piano-area {
  flex: 1;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px 0;
  min-height: 0;
}

/* ── Piano: white + black keys ───────────────────────────
   White keys are flex children.
   Black keys are position:absolute overlaid at z-index:2.
   The `box-shadow: 2px 0 0 …` trick draws separators between
   white keys without changing the box model (so black-key
   percentages stay exact).                                  */
.piano {
  position: relative;
  display: flex;
  width: 100%;
  height: clamp(120px, 36vw, 240px);
  touch-action: none;
}

.key-white {
  flex: 1;
  height: 100%;
  border: none;
  border-radius: 0 0 10px 10px;
  cursor: pointer;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 7px;
  font-family: inherit;
  font-size: clamp(0.55rem, 2vw, 0.85rem);
  font-weight: 900;
  color: rgba(0,0,0,0.45);
  /* Slot separator + bottom shadow + top highlight — no border used */
  box-shadow: 2px 0 0 rgba(0,0,0,0.2),
              0 5px 0 rgba(0,0,0,0.22),
              inset 0 1px 0 rgba(255,255,255,0.30);
  transition: transform 0.07s ease, filter 0.07s ease, box-shadow 0.07s ease;
  z-index: 1;
  will-change: transform;
}
.key-white.pressed {
  transform: scaleY(0.93) translateY(4px);
  filter: brightness(1.25);
  box-shadow: 2px 0 0 rgba(0,0,0,0.2),
              0 1px 0 rgba(0,0,0,0.15),
              inset 0 1px 0 rgba(255,255,255,0.12);
}

.key-black {
  position: absolute;
  top: 0;
  height: 62%;
  border: none;
  border-radius: 0 0 7px 7px;
  cursor: pointer;
  box-shadow: 0 4px 0 rgba(0,0,0,0.48),
              inset 0 1px 0 rgba(255,255,255,0.12);
  transition: transform 0.07s ease, filter 0.07s ease, box-shadow 0.07s ease;
  z-index: 2;
  will-change: transform;
}
.key-black.pressed {
  transform: translateY(3px);
  filter: brightness(1.5);
  box-shadow: 0 1px 0 rgba(0,0,0,0.35);
}

/* ── Record control ─────────────────────────────────────── */
.controls {
  width: 100%;
  display: flex;
  justify-content: center;
  padding-bottom: 4px;
}
.rec-btn {
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: 999px;
  color: var(--text);
  font-family: inherit; font-size: 1rem; font-weight: 800;
  padding: 14px 44px; cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 9px;
  min-width: 168px; justify-content: center;
}
.rec-btn:hover { border-color: rgba(232,237,245,0.25); }
.rec-btn.recording {
  background: rgba(255,60,60,0.1);
  border-color: #ff5050;
  color: #ff5050;
  animation: pulse-ring 1.1s ease-in-out infinite;
}
@keyframes pulse-ring {
  0%,100% { box-shadow: 0 0 0 0   rgba(255,60,60,0.35); }
  50%      { box-shadow: 0 0 0 10px rgba(255,60,60,0);  }
}

/* ── Keyboard hint ──────────────────────────────────────── */
.kb-hint {
  font-size: 0.72rem; color: var(--muted);
  text-align: center; letter-spacing: 0.02em; line-height: 1.6;
}
@media (pointer: coarse) { .kb-hint { display: none; } }

/* ── Save screen ────────────────────────────────────────── */
.save-page {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 20px;
  min-height: 100dvh; width: 100%;
  max-width: 420px;
  padding: 32px 24px env(safe-area-inset-bottom, 32px);
}
.save-emoji  { font-size: 4rem; line-height: 1; }
.save-title  { font-size: 1.7rem; font-weight: 900; text-align: center; }
.save-hint   { font-size: 0.875rem; color: var(--muted); text-align: center; margin-top: -8px; }
.tune-input {
  width: 100%;
  background: var(--surface2);
  border: 2px solid var(--border); border-radius: 16px;
  color: var(--text);
  font-family: inherit; font-size: 1.25rem; font-weight: 700;
  padding: 16px 20px; text-align: center; outline: none;
  -webkit-user-select: text; user-select: text;
  transition: border-color 0.15s;
}
.tune-input:focus       { border-color: var(--cyan); }
.tune-input::placeholder { color: var(--muted); font-weight: 400; }
.save-actions { display: flex; gap: 12px; width: 100%; }
.btn-secondary {
  flex: 1;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 14px;
  color: var(--muted); font-family: inherit; font-size: 1rem; font-weight: 700;
  padding: 15px 0; cursor: pointer; transition: all 0.15s;
}
.btn-secondary:hover { color: var(--text); }
.btn-primary {
  flex: 2;
  background: var(--cyan); border: none; border-radius: 14px;
  color: #0a1628; font-family: inherit; font-size: 1rem; font-weight: 800;
  padding: 15px 0; cursor: pointer; transition: filter 0.15s;
}
.btn-primary:hover { filter: brightness(1.08); }

/* ── Gallery screen ─────────────────────────────────────── */
.gallery-title { font-size: 1.5rem; font-weight: 900; text-align: center; width: 100%; }
.tunes-list { width: 100%; display: flex; flex-direction: column; gap: 12px; }
.tune-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 18px; padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  transition: all 0.15s; cursor: pointer;
}
.tune-card:hover { border-color: var(--cyan); box-shadow: 0 0 16px var(--cyan-dim); }
.tune-card:active { transform: scale(0.98); }
.tune-card-icon  { font-size: 1.6rem; flex-shrink: 0; }
.tune-card-info  { flex: 1; min-width: 0; }
.tune-card-name  { font-size: 1rem; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tune-card-meta  { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
.tune-card-btns  { display: flex; gap: 6px; flex-shrink: 0; }
.btn-play {
  background: var(--cyan-dim); border: 1px solid var(--cyan); color: var(--cyan);
  border-radius: 999px; font-family: inherit; font-size: 0.85rem; font-weight: 800;
  padding: 7px 14px; cursor: pointer; transition: all 0.15s;
}
.btn-play:hover, .btn-play.playing { background: var(--cyan); color: #0a1628; }
.btn-del {
  background: none; border: 1px solid var(--border); color: var(--muted);
  border-radius: 999px; font-family: inherit; font-size: 0.8rem; font-weight: 700;
  padding: 7px 10px; cursor: pointer; transition: all 0.15s;
}
.btn-del:hover { border-color: #ff5050; color: #ff5050; }
.gallery-empty {
  text-align: center; color: var(--muted);
  font-size: 1rem; line-height: 1.7; padding: 40px 20px;
}

.hidden { display: none !important; }

/* ── iPad landscape: fill screen with tall keys ─────────── */
@media (orientation: landscape) and (min-width: 768px) {
  .page {
    max-width: 100%;
    padding: 6px 16px max(8px, env(safe-area-inset-bottom, 8px));
    gap: 6px;
  }
  .app-header { display: none; }
  .piano {
    height: clamp(200px, calc(100dvh - 110px), 520px);
  }
  .key-white {
    border-radius: 0 0 14px 14px;
    padding-bottom: 10px;
    font-size: clamp(0.5rem, 1.1vw, 0.8rem);
  }
  .key-black { border-radius: 0 0 10px 10px; }
  .kb-hint   { display: none; }
  .rec-btn   { padding: 10px 32px; }
}
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     PIANO SCREEN
     ══════════════════════════════════════════════════════════ -->
<section id="screen-piano" class="screen active">
<div class="page">

  <div class="top-bar">
    <a class="back-btn" href="../">← Create</a>
    <button class="tunes-btn" id="btn-my-tunes">My Tunes 🎵</button>
    <div id="kw-shell-mount"></div>
  </div>

  <div class="app-header">
    <div class="app-title">🎹 Tap Piano</div>
    <div class="app-sub">A rainbow chromatic piano</div>
  </div>

  <div class="piano-area">
    <div class="piano" id="piano">
      <!-- keys injected by JS -->
    </div>
  </div>

  <div class="controls">
    <button class="rec-btn" id="btn-record">● Record</button>
  </div>

  <div class="kb-hint">
    Natural keys: A&nbsp;S&nbsp;D&nbsp;F&nbsp;G&nbsp;H&nbsp;J&nbsp;K &nbsp;·&nbsp;
    Sharps: W&nbsp;E&nbsp;&nbsp;T&nbsp;Y&nbsp;U
  </div>

</div>
</section>


<!-- ══════════════════════════════════════════════════════════
     SAVE SCREEN
     ══════════════════════════════════════════════════════════ -->
<section id="screen-save" class="screen">
  <div class="save-page">
    <div class="save-emoji">🎵</div>
    <div class="save-title">Name your tune!</div>
    <p class="save-hint">Give it a fun name so you can find it later</p>
    <input class="tune-input" id="tune-name" type="text"
           placeholder="e.g. Rainbow Song" maxlength="30"
           autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="save-actions">
      <button class="btn-secondary" id="btn-save-discard">Discard</button>
      <button class="btn-primary"   id="btn-save-ok">Save it 💾</button>
    </div>
  </div>
</section>


<!-- ══════════════════════════════════════════════════════════
     GALLERY SCREEN
     ══════════════════════════════════════════════════════════ -->
<section id="screen-gallery" class="screen">
<div class="page">
  <div class="top-bar">
    <button class="back-btn" id="btn-gallery-back">← Back</button>
  </div>
  <div class="gallery-title">My Tunes 🎵</div>
  <div class="tunes-list" id="tunes-list"></div>
  <p class="gallery-empty hidden" id="gallery-empty">
    No tunes saved yet.<br>Record something! 🎹
  </p>
</div>
</section>


<script src="/shared/subdomain-nav.js"></script>
<script>
'use strict';

/* ── Note definitions ───────────────────────────────────────
   One octave template: 12 chromatic notes (C to B).
   White keys get a label (shown at the bottom of the key).
   Black keys use deeper/darker tints of their neighbours.    */
const OCTAVE_TMPL = [
  { name:'C',  type:'white', freq:261.63, color:'#FF6B6B' },
  { name:'C#', type:'black', freq:277.18, color:'#B83344' },
  { name:'D',  type:'white', freq:293.66, color:'#FF9E4F' },
  { name:'D#', type:'black', freq:311.13, color:'#BB7700' },
  { name:'E',  type:'white', freq:329.63, color:'#FFD166' },
  { name:'F',  type:'white', freq:349.23, color:'#7BE87B' },
  { name:'F#', type:'black', freq:369.99, color:'#228844' },
  { name:'G',  type:'white', freq:392.00, color:'#4ECDC4' },
  { name:'G#', type:'black', freq:415.30, color:'#118899' },
  { name:'A',  type:'white', freq:440.00, color:'#5B9CF6' },
  { name:'A#', type:'black', freq:466.16, color:'#2244BB' },
  { name:'B',  type:'white', freq:493.88, color:'#B09FE8' },
];

/* Close the octave with a top-C; wrap the 2nd octave slightly lighter */
function makeOctave(tmpl, freqMult, lightenAmt) {
  return tmpl.map(n => ({
    ...n,
    freq:  Math.round(n.freq * freqMult * 100) / 100,
    color: lightenAmt > 0 ? lighten(n.color, lightenAmt) : n.color,
  }));
}

const TOP_C = { name:'C', type:'white', freq:523.25,  color:'#FF82C8' };
const TOP_C2 = { name:'C', type:'white', freq:1046.50, color:'#FF82C8' };

/* 1 octave = 13 notes (8 white + 5 black) */
const ONE_OCT = [...OCTAVE_TMPL, TOP_C];

/* 2 octaves = 25 notes (15 white + 10 black).
   2nd octave uses slightly lighter colours to show it's higher. */
const TWO_OCT = [...OCTAVE_TMPL, ...makeOctave(OCTAVE_TMPL, 2, 0.06), TOP_C2];

/* Legacy freq map — so old saved tunes (index 0-7) still play correctly */
const LEGACY = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];

let currentNotes = null;

/* ── Audio ──────────────────────────────────────────────────*/
let audioCtx = null;

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playNote(freq) {
  const ctx    = getCtx();
  const now    = ctx.currentTime;
  const osc1   = ctx.createOscillator();
  const osc2   = ctx.createOscillator();
  const gain1  = ctx.createGain();
  const gain2  = ctx.createGain();
  const master = ctx.createGain();

  osc1.type = 'triangle'; osc1.frequency.value = freq;
  osc2.type = 'sine';     osc2.frequency.value = freq * 2;

  osc1.connect(gain1); gain1.connect(master);
  osc2.connect(gain2); gain2.connect(master);
  master.connect(ctx.destination);

  gain1.gain.value = 0.72;
  gain2.gain.value = 0.22;

  master.gain.setValueAtTime(0, now);
  master.gain.linearRampToValueAtTime(0.52, now + 0.010);
  master.gain.exponentialRampToValueAtTime(0.18, now + 0.20);
  master.gain.exponentialRampToValueAtTime(0.001, now + 1.5);

  osc1.start(now); osc1.stop(now + 1.5);
  osc2.start(now); osc2.stop(now + 1.5);
}

/* ── Colour utility ─────────────────────────────────────────*/
function lighten(hex, amount) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, ((n >> 16) & 0xff) + Math.round(255 * amount));
  const g = Math.min(255, ((n >>  8) & 0xff) + Math.round(255 * amount));
  const b = Math.min(255,  (n        & 0xff) + Math.round(255 * amount));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

/* ── Build piano ────────────────────────────────────────────
   Appends all white keys as flex children, then all black keys
   as position:absolute overlays. The separation between keys
   is drawn by the `box-shadow: 2px 0 0` on white keys — this
   adds a dark stripe without affecting the box model, so black
   key percentage positions remain exact.                     */
function buildPiano(notes) {
  currentNotes = notes;
  const pianoEl = document.getElementById('piano');
  pianoEl.innerHTML = '';

  const nWhite   = notes.filter(n => n.type === 'white').length;
  const wPct     = 100 / nWhite;
  const bPct     = 0.62 * wPct;   // black key = 62% of white key width

  let wIdx = 0;   // count of white keys placed so far

  notes.forEach((note, i) => {
    const el = document.createElement('button');
    el.dataset.noteIndex = i;
    el.dataset.freq = note.freq;

    if (note.type === 'white') {
      el.className = 'key key-white';
      el.style.background =
        `linear-gradient(175deg, ${lighten(note.color, 0.14)} 0%, ${note.color} 100%)`;
      el.textContent = note.name;   // 'C', 'D', 'E' etc.
      pianoEl.appendChild(el);
      wIdx++;
    } else {
      // Black key: centered at the boundary between white key (wIdx-1) and wIdx
      el.className = 'key key-black';
      el.style.background =
        `linear-gradient(175deg, ${lighten(note.color, 0.07)} 0%, ${note.color} 100%)`;
      el.style.width = bPct + '%';
      el.style.left  = (wIdx * wPct - bPct / 2) + '%';
      pianoEl.appendChild(el);
    }
  });
}

/* ── Piano interaction ──────────────────────────────────────
   Using elementsFromPoint in pointermove lets the user slide
   across keys (a real piano feel) — touching a black key still
   correctly hits the black key even though the pointer was
   captured by the piano container.                           */
const pianoEl = document.getElementById('piano');
let lastKeyEl = null;

pianoEl.addEventListener('pointerdown', e => {
  e.preventDefault();
  pianoEl.setPointerCapture(e.pointerId);
  lastKeyEl = null;
  firePianoAt(e.clientX, e.clientY);
});

pianoEl.addEventListener('pointermove', e => {
  if (!pianoEl.hasPointerCapture(e.pointerId)) return;
  e.preventDefault();
  firePianoAt(e.clientX, e.clientY);
});

pianoEl.addEventListener('pointerup',     () => { lastKeyEl = null; });
pianoEl.addEventListener('pointercancel', () => { lastKeyEl = null; });

function firePianoAt(cx, cy) {
  /* Pick the topmost .key element at (cx, cy) — black keys sit at z:2
     so they'll be returned first when under the pointer.              */
  const els = document.elementsFromPoint(cx, cy);
  const key = els.find(el => el.classList && el.classList.contains('key'));
  if (!key || key === lastKeyEl) return;
  if (lastKeyEl) lastKeyEl.classList.remove('pressed');
  lastKeyEl = key;
  triggerKey(parseInt(key.dataset.noteIndex), key);
}

function triggerKey(index, el) {
  const note = currentNotes[index];
  if (!note) return;
  playNote(note.freq);
  el.classList.add('pressed');
  setTimeout(() => el.classList.remove('pressed'), 140);
  if (isRecording) {
    /* Store frequency so recordings survive piano layout changes */
    recorded.push({ freq: note.freq, t: Math.round(performance.now() - recStart) });
  }
}

/* ── Responsive octave: 1 on portrait/phone, 2 on iPad landscape ── */
const tabletMQ = window.matchMedia('(orientation: landscape) and (min-width: 768px)');

function rebuildPiano() {
  buildPiano(tabletMQ.matches ? TWO_OCT : ONE_OCT);
}
tabletMQ.addEventListener('change', rebuildPiano);

/* ── Recording ──────────────────────────────────────────────*/
let isRecording = false;
let recStart    = 0;
let recorded    = [];

const recBtn = document.getElementById('btn-record');
recBtn.addEventListener('click', () => {
  if (!isRecording) {
    isRecording = true;
    recStart    = performance.now();
    recorded    = [];
    recBtn.textContent = '■ Stop';
    recBtn.classList.add('recording');
  } else {
    isRecording = false;
    recBtn.textContent = '● Record';
    recBtn.classList.remove('recording');
    if (!recorded.length) return;
    const t0 = recorded[0].t;
    recorded  = recorded.map(n => ({ ...n, t: n.t - t0 }));
    showScreen('save');
    const inp = document.getElementById('tune-name');
    inp.value = '';
    setTimeout(() => inp.focus(), 260);
  }
});

/* ── Storage ────────────────────────────────────────────────*/
const STORE_KEY = 'kw-tappiano-tunes';
function loadTunes() {
  try   { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); }
  catch { return []; }
}
function saveTunes(arr) { localStorage.setItem(STORE_KEY, JSON.stringify(arr)); }

/* ── Save ───────────────────────────────────────────────────*/
document.getElementById('btn-save-ok').addEventListener('click', () => {
  const name  = document.getElementById('tune-name').value.trim() || 'My Song';
  const tunes = loadTunes();
  tunes.unshift({ id: String(Date.now()), name, notes: recorded, created: Date.now() });
  saveTunes(tunes);
  recorded = [];
  showScreen('piano');
});

document.getElementById('btn-save-discard').addEventListener('click', () => {
  recorded = [];
  showScreen('piano');
});

document.getElementById('tune-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-save-ok').click();
});

/* ── Gallery ────────────────────────────────────────────────*/
document.getElementById('btn-my-tunes').addEventListener('click', () => {
  renderGallery(); showScreen('gallery');
});
document.getElementById('btn-gallery-back').addEventListener('click', () => {
  stopPlayback(); showScreen('piano');
});

function renderGallery() {
  const tunes = loadTunes();
  const list  = document.getElementById('tunes-list');
  const empty = document.getElementById('gallery-empty');
  list.innerHTML = '';
  if (!tunes.length) { empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');

  tunes.forEach(tune => {
    const card = document.createElement('div');
    card.className = 'tune-card';
    const date   = new Date(tune.created).toLocaleDateString(undefined, { month:'short', day:'numeric' });
    const nLabel = tune.notes.length + ' note' + (tune.notes.length !== 1 ? 's' : '');
    card.innerHTML =
      `<div class="tune-card-icon">🎵</div>` +
      `<div class="tune-card-info">` +
        `<div class="tune-card-name">${esc(tune.name)}</div>` +
        `<div class="tune-card-meta">${date} &middot; ${nLabel}</div>` +
      `</div>` +
      `<div class="tune-card-btns">` +
        `<button class="btn-play" data-id="${tune.id}">▶ Play</button>` +
        `<button class="btn-del"  data-id="${tune.id}">✕</button>` +
      `</div>`;
    list.appendChild(card);
  });
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('tunes-list').addEventListener('click', e => {
  const playBtn = e.target.closest('.btn-play');
  const delBtn  = e.target.closest('.btn-del');
  if (playBtn) {
    const tune = loadTunes().find(t => t.id === playBtn.dataset.id);
    if (tune) startPlayback(tune, playBtn);
  }
  if (delBtn) {
    saveTunes(loadTunes().filter(t => t.id !== delBtn.dataset.id));
    renderGallery();
  }
});

/* ── Playback ───────────────────────────────────────────────*/
let pbTimers = [];

function stopPlayback() {
  pbTimers.forEach(clearTimeout);
  pbTimers = [];
  document.querySelectorAll('.btn-play.playing').forEach(b => {
    b.classList.remove('playing');
    b.textContent = '▶ Play';
  });
}

function startPlayback(tune, btn) {
  stopPlayback();
  if (!tune.notes.length) return;
  btn.classList.add('playing');
  btn.textContent = '♪ ...';

  tune.notes.forEach(({ freq, note, t }) => {
    /* Support legacy recordings that stored an index (0-7) instead of freq */
    const f = freq !== undefined ? freq : (LEGACY[note] || null);
    if (!f) return;
    pbTimers.push(setTimeout(() => {
      playNote(f);
      const keyEl = document.querySelector(`.key[data-freq="${f}"]`);
      if (keyEl) {
        keyEl.classList.add('pressed');
        setTimeout(() => keyEl.classList.remove('pressed'), 140);
      }
    }, t));
  });

  const lastT = tune.notes[tune.notes.length - 1].t;
  pbTimers.push(setTimeout(() => {
    btn.classList.remove('playing');
    btn.textContent = '▶ Play';
  }, lastT + 700));
}

/* ── Desktop keyboard (QWERTY piano layout) ─────────────────
   Natural keys: A S D F G H J K  →  C D E F G A B C
   Sharp  keys: W E · T Y U ·    →  C# D# · F# G# A# ·      */
const KEY_TO_FREQ = {
  'a': 261.63,  // C4
  'w': 277.18,  // C#4
  's': 293.66,  // D4
  'e': 311.13,  // D#4
  'd': 329.63,  // E4
  'f': 349.23,  // F4
  't': 369.99,  // F#4
  'g': 392.00,  // G4
  'y': 415.30,  // G#4
  'h': 440.00,  // A4
  'u': 466.16,  // A#4
  'j': 493.88,  // B4
  'k': 523.25,  // C5
};

document.addEventListener('keydown', e => {
  if (e.repeat || e.target.tagName === 'INPUT') return;
  const freq = KEY_TO_FREQ[e.key.toLowerCase()];
  if (!freq) return;
  const keyEl = document.querySelector(`.key[data-freq="${freq}"]`);
  if (keyEl) triggerKey(parseInt(keyEl.dataset.noteIndex), keyEl);
});

/* ── Screen management ──────────────────────────────────────*/
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

/* ── Init ───────────────────────────────────────────────────*/
rebuildPiano();
