<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0a1628">
  <title>Create · Kapework</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:        #0a1628;
  --surface:   #121e33;
  --surface2:  #1a2a44;
  --cyan:      #00e5cc;
  --cyan-dim:  rgba(0,229,204,0.15);
  --text:      #e8edf5;
  --muted:     rgba(232,237,245,0.5);
  --border:    rgba(232,237,245,0.08);
}

html, body {
  height: 100%;
  background: var(--bg);
  overscroll-behavior: none;
}

body {
  font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100dvh;
  -webkit-user-select: none;
  user-select: none;
}

a { color: inherit; text-decoration: none; }

/* ─── Page layout ──────────────────────────────────────────── */
.page {
  width: 100%;
  max-width: 480px;
  padding: 16px 16px env(safe-area-inset-bottom, 16px);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  flex: 1;
}

/* ─── Top bar ──────────────────────────────────────────────── */
.top-bar {
  width: 100%;
  display: flex;
  justify-content: flex-start;
  align-items: center;
}

.back-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 8px;
  transition: color 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.back-btn:hover { color: var(--text); }

/* ─── Header ───────────────────────────────────────────────── */
.hub-header { text-align: center; }
.hub-logo   { font-size: 3rem; line-height: 1; }
.hub-title  { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.5px; margin-top: 8px; }
.hub-sub    { font-size: 0.9rem; color: var(--muted); margin-top: 4px; }

/* ─── App cards ───────────────────────────────────────────── */
.app-cards {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
}

a.app-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
  cursor: pointer;
}
a.app-card:hover { transform: translateY(-2px); border-color: var(--cyan); box-shadow: 0 0 20px var(--cyan-dim); }
a.app-card:active { transform: scale(0.98); }

.app-card--soon {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  opacity: 0.55;
  cursor: default;
}

.app-icon { font-size: 2.5rem; flex-shrink: 0; }
.app-info { flex: 1; }
.app-name { font-size: 1.1rem; font-weight: 800; }
.app-desc { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

.app-badge {
  font-size: 0.8rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--cyan-dim);
  color: var(--cyan);
  border: 1px solid var(--cyan);
  flex-shrink: 0;
}

.app-badge--soon {
  font-size: 0.8rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 999px;
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  flex-shrink: 0;
}

/* ─── Footer ───────────────────────────────────────────────── */
.hub-footer {
  margin-top: auto;
  color: var(--muted);
  font-size: 0.75rem;
  text-align: center;
  padding-bottom: 8px;
}
  </style>
</head>
<body>

<div class="page">

  <div class="hub-header">
    <div class="hub-logo">🎨</div>
    <h1 class="hub-title">Create</h1>
    <p class="hub-sub">Creative toys and art apps</p>
  </div>

  <div class="app-cards">

    <a class="app-card" href="colorsign/">
      <div class="app-icon">🖍️</div>
      <div class="app-info">
        <div class="app-name">Color &amp; Sign</div>
        <div class="app-desc">A tiny picture-making toy</div>
      </div>
      <div class="app-badge">Play</div>
    </a>

    <a class="app-card" href="tappiano/">
      <div class="app-icon">🎹</div>
      <div class="app-info">
        <div class="app-name">Tap Piano</div>
        <div class="app-desc">A tiny rainbow piano</div>
      </div>
      <div class="app-badge">Play</div>
    </a>

    <a class="app-card" href="magicmirror/">
      <div class="app-icon">🪞</div>
      <div class="app-info">
        <div class="app-name">Magic Mirror</div>
        <div class="app-desc">Draw once, see magic</div>
      </div>
      <div class="app-badge">Play</div>
    </a>

    <a class="app-card" href="pixeltiles/">
      <div class="app-icon">🟦</div>
      <div class="app-info">
        <div class="app-name">Pixel Tiles</div>
        <div class="app-desc">Tap tiles to make pictures</div>
      </div>
      <div class="app-badge">Play</div>
    </a>

    <a class="app-card" href="coloringpage/">
      <div class="app-icon">🖼️</div>
      <div class="app-info">
        <div class="app-name">Color Pages</div>
        <div class="app-desc">Turn photos into coloring pages</div>
      </div>
      <div class="app-badge">Play</div>
    </a>

  </div>

  <div class="hub-footer">Kapework · Create v1</div>

</div>

<script src="/shared/config.js"></script>
<script src="/shared/analytics.js"></script>
<script src="/shared/subdomain-nav.js"></script>
</body>
</html>
